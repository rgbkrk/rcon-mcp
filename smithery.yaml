# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - minecraftContainerName
    properties:
      minecraftContainerName:
        type: string
        description: The Docker container name for the running Minecraft server.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'python', args: ['rcon.py'], env: { 'MINECRAFT_CONTAINER_NAME': config.minecraftContainerName } })
